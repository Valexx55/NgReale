<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <div class="card shadow-sm">
        <div class="card-header">
          <h5 class="mb-0">Contratación · Paso 2/3</h5>
        </div>

        <div class="card-body">
          <p class="text-muted mb-4">Datos del vehículo</p>

          <div class="mb-3">
            <label class="form-label">Matrícula</label>
            <input class="form-control" [(ngModel)]="coche.matricula" placeholder="Ej: 1234 ABC" />
          </div>

          <div class="mb-3">
            <label class="form-label">Modelo</label>
            <input class="form-control" [(ngModel)]="coche.modelo" placeholder="Ej: Seat León" />
          </div>
        </div>

        <div class="card-footer d-flex justify-content-between gap-2">
          <button class="btn btn-outline-secondary" (click)="anterior()">
            Anterior
          </button>

          <button class="btn btn-primary" (click)="siguiente()"
                  [disabled]="!coche.matricula || !coche.modelo">
            Siguiente
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
