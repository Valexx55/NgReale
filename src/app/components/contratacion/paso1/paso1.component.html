<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <div class="card shadow-sm">
        <div class="card-header">
          <h5 class="mb-0">Contratación · Paso 1/3</h5>
        </div>

        <div class="card-body">
          <p class="text-muted mb-4">Datos personales</p>

          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input class="form-control" [(ngModel)]="persona.nombre" placeholder="Ej: Valeriano" />
          </div>

          <div class="mb-3">
            <label class="form-label">Edad</label>
            <input class="form-control" type="number" [(ngModel)]="persona.edad" placeholder="Ej: 35" />
          </div>

          <div class="mb-3">
            <label class="form-label">Sexo</label>
            <select class="form-select" [(ngModel)]="persona.sexo">
              <option value="">-- Selecciona --</option>
              <option value="H">H</option>
              <option value="M">M</option>
              <option value="X">X</option>
            </select>
          </div>
        </div>

        <div class="card-footer d-flex justify-content-end gap-2">
          <button class="btn btn-primary" (click)="siguiente()"
                  [disabled]="!persona.nombre || !persona.edad || !persona.sexo">
            Siguiente
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
